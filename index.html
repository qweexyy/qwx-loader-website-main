<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QWX Loader</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #cc0000;
    --red-bright: #ff2222;
    --red-glow: #ff4444;
    --red-dim: #660000;
    --bg: #080000;
    --bg2: #100000;
    --text: #f0e0e0;
    --text-muted: #996666;
    --border: rgba(204,0,0,0.25);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 48px;
    background: rgba(8,0,0,0.8);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
  }

  .nav-logo img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    filter: drop-shadow(0 0 10px rgba(255,34,34,0.6));
  }

  .nav-logo span {
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-bright);
  }

  /* HERO */
  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 120px 80px 80px;
  }

  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    color: var(--red-glow);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.7s 0.15s forwards;
  }

  .hero-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(3.5rem, 9vw, 8rem);
    line-height: 0.9;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #fff;
    opacity: 0;
    animation: fadeUp 0.7s 0.3s forwards;
  }

  .hero-title .accent {
    color: var(--red-bright);
    text-shadow: 0 0 60px rgba(255,34,34,0.5), 0 0 120px rgba(204,0,0,0.25);
    display: block;
  }

  .hero-sub {
    max-width: 460px;
    margin-top: 28px;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text-muted);
    opacity: 0;
    animation: fadeUp 0.7s 0.45s forwards;
  }

  .hero-actions {
    margin-top: 44px;
    opacity: 0;
    animation: fadeUp 0.7s 0.6s forwards;
  }

  .btn-primary {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
    background: var(--red);
    border: none;
    padding: 16px 44px;
    cursor: pointer;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    animation: pulse-glow 2.5s ease-in-out infinite;
  }

  .btn-primary:hover {
    background: var(--red-bright);
    box-shadow: 0 0 48px rgba(255,34,34,0.7);
    transform: translateY(-2px);
  }

  .btn-primary svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* DIVIDER */
  .red-divider {
    position: relative;
    z-index: 1;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--red-bright) 50%, var(--red) 70%, transparent 100%);
    box-shadow: 0 0 20px rgba(204,0,0,0.45);
    overflow: hidden;
  }

  .red-divider::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
    animation: shimmer 2.8s infinite 1.2s;
  }

  /* CLIENTS SECTION */
  .clients-section {
    position: relative;
    z-index: 1;
    padding: 80px 80px 100px;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red-glow);
    margin-bottom: 10px;
  }

  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 2.6rem;
    text-transform: uppercase;
    color: #fff;
    letter-spacing: 0.02em;
    margin-bottom: 48px;
  }

  .clients-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }

  .client-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    animation: cardIn 0.5s both;
    position: relative;
  }

  .client-card:nth-child(1) { animation-delay: 0.05s; }
  .client-card:nth-child(2) { animation-delay: 0.12s; }
  .client-card:nth-child(3) { animation-delay: 0.19s; }
  .client-card:nth-child(4) { animation-delay: 0.26s; }
  .client-card:nth-child(5) { animation-delay: 0.33s; }
  .client-card:nth-child(6) { animation-delay: 0.40s; }

  .client-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(204,0,0,0.07) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .client-card:hover {
    border-color: rgba(255,34,34,0.55);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(204,0,0,0.22);
    z-index: 2;
  }

  .client-card:hover::after { opacity: 1; }

  .card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #0d0000;
    overflow: hidden;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s;
    filter: brightness(0.8);
  }

  .client-card:hover .card-img-wrap img {
    transform: scale(1.05);
    filter: brightness(1);
  }

  .card-img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(8,0,0,0.88) 0%, transparent 55%);
  }

  .card-tag {
    position: absolute;
    top: 12px;
    left: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red-glow);
    background: rgba(8,0,0,0.85);
    border: 1px solid var(--red-dim);
    padding: 4px 10px;
  }

  .card-body {
    padding: 20px 22px 22px;
  }

  .card-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #fff;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 18px;
  }

  .card-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red-glow);
    background: rgba(204,0,0,0.1);
    border: 1px solid var(--red-dim);
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .card-btn:hover {
    background: rgba(204,0,0,0.25);
    border-color: var(--red-glow);
    color: #fff;
    box-shadow: 0 0 16px rgba(255,34,34,0.3);
  }

  .card-btn svg { width: 12px; height: 12px; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(6px);
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    border: 1px solid var(--red);
    box-shadow: 0 0 80px rgba(204,0,0,0.4);
    transform: scale(0.92);
    transition: transform 0.3s;
    background: var(--bg);
  }

  .modal-overlay.active .modal-box { transform: scale(1); }

  .modal-box img {
    display: block;
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--red-glow);
  }

  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    transition: border-color 0.2s, color 0.2s;
  }

  .modal-close:hover { border-color: var(--red-glow); color: var(--red-glow); }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 1;
    padding: 48px 80px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    background: rgba(8,0,0,0.85);
    text-align: center;
  }

  .footer-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
  }

  .footer-logo span {
    color: var(--red-bright);
    text-shadow: 0 0 16px var(--red-bright);
  }

  .support-btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
    padding: 12px 32px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .support-btn:hover {
    color: var(--red-glow);
    border-color: var(--red-glow);
    box-shadow: 0 0 20px rgba(255,68,68,0.2);
  }

  .support-btn svg { width: 14px; height: 14px; }

  /* KEYFRAMES */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shimmer {
    0%   { left: -100%; }
    100% { left: 200%; }
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(204,0,0,0.35); }
    50%       { box-shadow: 0 0 44px rgba(255,34,34,0.65); }
  }

  @media (max-width: 860px) {
    .hero { padding: 100px 28px 60px; }
    .clients-section { padding: 60px 24px 80px; }
    .clients-grid { grid-template-columns: 1fr; }
    footer { padding: 40px 24px; }
    nav { padding: 18px 24px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <img src="logo.png" alt="QWX Logo">
    <span>QWX</span> Loader
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">premium client loader</div>
  <h1 class="hero-title">
    Dominate<br>
    <span class="accent">every<br>match.</span>
  </h1>
  <p class="hero-sub">QWX Loader gives you instant access to the best clients available — one loader, all clients, always updated and ready to run.</p>
  <div class="hero-actions">
    <a href="#" class="btn-primary">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 2v8M4 7l4 4 4-4M2 12v2h12v-2"/>
      </svg>
      Download Now
    </a>
  </div>
</section>

<div class="red-divider"></div>

<!-- CLIENTS -->
<section class="clients-section">
  <div class="section-label">// available clients</div>
  <h2 class="section-title">Choose Your Client</h2>
  <div class="clients-grid" id="clients-grid"></div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">
    <img src="logo.png" alt="QWX Logo" style="width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(255,34,34,0.5));">
    <span>QWX</span> Loader
  </div>
  <a href="https://t.me/qwxloader-support" target="_blank" class="support-btn">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M14 2L2 6.5l4 1.5 1.5 4.5 2-3 3.5 2.5L14 2z"/>
    </svg>
    Support
  </a>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Client Preview</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <img id="modal-img" src="" alt="Client preview">
  </div>
</div>

<script>
const clients = [
  { name: "Test", tag: "Flagship", desc: "The original QWX client. Refined over dozens of iterations for the cleanest in-game experience with the lowest footprint.", img: "test.png" },
  { name: "Test", tag: "Speed",    desc: "Stripped to the essentials for lightning-fast injection. Minimal UI, maximum performance — zero distractions.", img: "test.png" },
  { name: "Test", tag: "Stealth",  desc: "The most aggressive bypass layer in the lineup. Runs silent, stays undetected, leaves no trace on disk.", img: "test.png" },
  { name: "Test", tag: "Pro",      desc: "Advanced configuration unlocks per-module tuning. Designed for experienced users who want full control.", img: "test.png" },
  { name: "Test", tag: "Legacy",   desc: "Optimized for older hardware and previous game builds. Full feature parity on lower-spec machines.", img: "test.png" },
  { name: "Test", tag: "Beta",     desc: "The cutting edge. Experimental features land here first — expect surprises and stay ahead of everyone.", img: "test.png" }
];

const grid = document.getElementById('clients-grid');
clients.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = 'client-card';
  card.innerHTML = `
    <div class="card-img-wrap">
      <img src="${c.img}" alt="${c.name} preview" onerror="this.style.cssText='width:100%;aspect-ratio:16/9;object-fit:cover;background:#0d0000;opacity:0.4'">
      <div class="card-img-overlay"></div>
      <span class="card-tag">${c.tag}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${c.name}</div>
      <p class="card-desc">${c.desc}</p>
      <button class="card-btn" onclick="openModal('${c.img}','${c.name} — ${c.tag}')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M1 1h4M1 1v4M11 11H7M11 11V7M1 11v-4M1 11h4M11 1v4M11 1H7"/>
        </svg>
        ${c.name}
      </button>
    </div>`;
  grid.appendChild(card);
});

function openModal(src, title) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// Background canvas
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const lines = Array.from({length: 14}, () => ({
  x: Math.random() * 1.4 - 0.2,
  y: Math.random(),
  speed: 0.00015 + Math.random() * 0.0003,
  width: 0.5 + Math.random() * 1.5,
  opacity: 0.03 + Math.random() * 0.08,
  angle: (Math.random() - 0.5) * 0.3
}));

const particles = Array.from({length: 60}, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.5 + Math.random() * 1.5,
  speed: 0.00008 + Math.random() * 0.00015,
  opacity: 0.05 + Math.random() * 0.2,
  pulse: Math.random() * Math.PI * 2
}));

function draw() {
  ctx.clearRect(0, 0, W, H);
  const grd = ctx.createRadialGradient(W*0.15, H*0.3, 0, W*0.5, H*0.5, W*0.7);
  grd.addColorStop(0, 'rgba(120,0,0,0.08)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  lines.forEach(l => {
    l.x += l.speed;
    if (l.x > 1.4) l.x = -0.4;
    const x = l.x * W, len = W * 0.35;
    const grad = ctx.createLinearGradient(x - len/2, 0, x + len/2, 0);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, `rgba(204,0,0,${l.opacity})`);
    grad.addColorStop(1, 'transparent');
    ctx.save();
    ctx.translate(x, l.y * H);
    ctx.rotate(l.angle);
    ctx.beginPath();
    ctx.moveTo(-len/2, 0);
    ctx.lineTo(len/2, 0);
    ctx.strokeStyle = grad;
    ctx.lineWidth = l.width;
    ctx.stroke();
    ctx.restore();
  });

  particles.forEach(p => {
    p.pulse += 0.025;
    p.y -= p.speed;
    if (p.y < -0.01) { p.y = 1.01; p.x = Math.random(); }
    const alpha = p.opacity * (0.6 + 0.4 * Math.sin(p.pulse));
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,60,60,${alpha})`;
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
